services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: true
    restart: unless-stopped
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_NAME: ${POSTGRES_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASS}
      REDIS_HOST: ${REDIS_HOST}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
      # TURN — leave blank to disable.
      # HMAC mode: set TURN_HOST + TURN_SECRET.
      # Static mode: set TURN_HOST + TURN_USERNAME + TURN_PASSWORD.
      TURN_HOST: ${TURN_HOST:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
      TURN_TTL: ${TURN_TTL:-86400}

#   # coturn — optional TURN/STUN relay for users behind strict NAT/firewalls.
