services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - db
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-videocall}
      POSTGRES_USER: ${DB_USER:-videocall}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-videocall}

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
