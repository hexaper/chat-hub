{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="text-center py-5">
    <div style="font-size:6rem;font-weight:700;line-height:1;color:var(--warning);opacity:0.15;letter-spacing:-0.05em">500</div>
    <div style="margin-top:-2rem">
        <i class="bi bi-exclamation-triangle" style="font-size:3.5rem;color:var(--warning)"></i>
    </div>
    <h2 class="mt-3 mb-2">Something Went Wrong</h2>
    <p style="color:var(--text-muted);max-width:380px;margin:0 auto 2rem">
        An unexpected error occurred on our end. Please try again in a moment.
    </p>
    <a href="/" class="btn btn-primary"><i class="bi bi-house me-2"></i>Go Home</a>
</div>
{% endblock %}
