{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-5">
    <div style="font-size:6rem;font-weight:700;line-height:1;color:var(--accent);opacity:0.15;letter-spacing:-0.05em">404</div>
    <div style="margin-top:-2rem">
        <i class="bi bi-compass" style="font-size:3.5rem;color:var(--accent)"></i>
    </div>
    <h2 class="mt-3 mb-2">Page Not Found</h2>
    <p style="color:var(--text-muted);max-width:380px;margin:0 auto 2rem">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/" class="btn btn-primary"><i class="bi bi-house me-2"></i>Go Home</a>
</div>
{% endblock %}
