{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Create Room{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="auth-card">
            <h2 class="mb-1 text-center"><i class="bi bi-door-open me-2"></i>Create Room</h2>
            <p class="text-center mb-4" style="color:var(--text-muted)">New room in {{ server.name }}</p>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button class="btn btn-primary w-100 mt-2">Create Room</button>
            </form>
            <p class="mt-3 text-center mb-0">
                <a href="{% url 'server_detail' server_slug=server.slug %}" class="text-decoration-none" style="color:var(--text-muted)">
                    <i class="bi bi-arrow-left me-1"></i>Back to {{ server.name }}
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
