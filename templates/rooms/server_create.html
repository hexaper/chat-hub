{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Create Server{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Create Server</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary w-100">Create Server</button>
        </form>
    </div>
</div>
{% endblock %}
