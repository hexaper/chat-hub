{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Join {{ room.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-4">
        <div class="auth-card">
            <div class="text-center mb-3">
                <i class="bi bi-lock-fill" style="font-size:2.5rem; color:var(--text-muted)"></i>
            </div>
            <h2 class="mb-1 text-center">{{ room.name }}</h2>
            <p class="text-center mb-4" style="color:var(--text-muted)">This room is password protected</p>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button class="btn btn-primary w-100 mt-2">Join Room</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
