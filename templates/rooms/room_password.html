{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Join {{ room.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="mb-1">{{ room.name }}</h2>
        <p class="text-muted mb-4">This room is password protected.</p>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary w-100">Join Room</button>
        </form>
    </div>
</div>
{% endblock %}
