<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VideoCall{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'room_list' %}">VideoCall</a>
        <div class="ms-auto d-flex gap-2">
            {% if user.is_authenticated %}
                <a class="btn btn-sm btn-outline-light" href="{% url 'device_list' %}">Devices</a>
                <a class="btn btn-sm btn-outline-light" href="{% url 'profile' %}">{{ user.username }}</a>
                <a class="btn btn-sm btn-danger" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="btn btn-sm btn-outline-light" href="{% url 'login' %}">Login</a>
                <a class="btn btn-sm btn-primary" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
<main class="container py-4">
    {% for message in messages %}
        <div class="alert alert-info alert-dismissible fade show">{{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
