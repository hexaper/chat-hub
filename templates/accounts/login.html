{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="mb-4">Login</h2>
        <form method="post">{% csrf_token %}{{ form|crispy }}<button class="btn btn-primary w-100">Login</button></form>
        <p class="mt-3 text-center">No account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
{% endblock %}
