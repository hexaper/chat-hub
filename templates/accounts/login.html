{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-4">
        <div class="auth-card">
            <h2 class="mb-1 text-center">Welcome back</h2>
            <p class="text-muted text-center mb-4">Sign in to your account</p>
            <form method="post">{% csrf_token %}{{ form|crispy }}<button class="btn btn-primary w-100 mt-2">Login</button></form>
            <p class="mt-3 text-center mb-0"><small class="text-muted">No account? <a href="{% url 'register' %}">Register</a></small></p>
        </div>
    </div>
</div>
{% endblock %}
