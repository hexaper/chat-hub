{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="auth-card">
            <h2 class="mb-1 text-center">Create Account</h2>
            <p class="text-muted text-center mb-4">Join VideoCall to get started</p>
            <form method="post">{% csrf_token %}{{ form|crispy }}<button class="btn btn-primary w-100 mt-2">Register</button></form>
            <p class="mt-3 text-center mb-0"><small class="text-muted">Already have an account? <a href="{% url 'login' %}">Login</a></small></p>
        </div>
    </div>
</div>
{% endblock %}
